<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — {{ app_name }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #fff; padding: 2.5rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 100%; max-width: 400px; margin: 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #111; }
        p { color: #666; margin-bottom: 1.5rem; font-size: 0.95rem; }
        label { display: block; font-weight: 500; margin-bottom: 0.5rem; color: #333; font-size: 0.9rem; }
        input[type="email"], input[type="password"] { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; }
        input[type="email"]:focus, input[type="password"]:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        button { width: 100%; padding: 0.75rem; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 500; }
        button:hover { background: #4338ca; }
        .error { color: #dc2626; margin-bottom: 1rem; font-size: 0.9rem; }
        .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb; }
        .tab { flex: 1; padding: 0.6rem 0; text-align: center; font-size: 0.9rem; font-weight: 500; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.15s, border-color 0.15s; }
        .tab:hover { color: #666; }
        .tab.active { color: #4f46e5; border-bottom-color: #4f46e5; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>{{ app_name }}</h1>
        {% if enable_api_keys %}
        <p>Sign in with your email or API key.</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <div class="tabs">
            <div class="tab active" onclick="switchTab('email')">Email</div>
            <div class="tab" onclick="switchTab('apikey')">API Key</div>
        </div>
        <div id="tab-email" class="tab-content active">
            <form method="post" action="/auth/login">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com" autofocus>
                <button type="submit">Send Magic Link</button>
            </form>
        </div>
        <div id="tab-apikey" class="tab-content">
            <form method="post" action="/auth/api-key-login">
                <label for="api_key">API key</label>
                <input type="password" id="api_key" name="api_key" required placeholder="gbox_pk_...">
                <button type="submit">Sign In with API Key</button>
            </form>
        </div>
        <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            if (tab === 'apikey') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('tab-apikey').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('tab-email').classList.add('active');
            }
        }
        </script>
        {% else %}
        <p>Enter your email to receive a sign-in link.</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/auth/login">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" required placeholder="you@example.com" autofocus>
            <button type="submit">Send Magic Link</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
